<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0d14" />
    <meta name="description" content="InfraPilot — DevOps Monitoring Dashboard" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0a0d14',
              card: '#111827',
              cyan: {
                DEFAULT: '#00f5ff',
                glow: 'rgba(0, 245, 255, 0.3)',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0a0d14;
        margin: 0;
        font-family: 'Inter', sans-serif;
        color: #f9fafb;
        scrollbar-width: thin;
        scrollbar-color: #1f2937 transparent;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f2937;
        border-radius: 3px;
      }
      .dot-grid {
        background-image: radial-gradient(circle, #1f2937 1px, transparent 1px);
        background-size: 32px 32px;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-blink {
        animation: blink 1.2s infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 5px rgba(0, 245, 255, 0.2); }
        50% { box-shadow: 0 0 15px rgba(0, 245, 255, 0.5); }
      }
      .glow-cyan {
        animation: pulse-glow 2s infinite;
      }
    </style>
    <title>InfraPilot — DevOps Monitoring</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
